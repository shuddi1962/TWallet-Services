openapi: 3.1.0
info:
  title: TWallet Services API — Notifications
  version: 1.0.0
servers:
  - url: https://api.twalletservices.com/api/v1
paths:
  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: type, in: query, schema: { type: string } }
        - { name: read, in: query, schema: { type: boolean } }
        - { name: page_size, in: query, schema: { type: integer, default: 20 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200': { description: Notification list }
  /notifications/read:
    patch:
      tags: [Notifications]
      summary: Mark notifications as read
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids: { type: array, items: { type: string, format: uuid } }
                all: { type: boolean }
      responses:
        '200': { description: Notifications marked as read }
  /notifications/{id}:
    delete:
      tags: [Notifications]
      summary: Delete a notification
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Notification deleted }
  /notifications/preferences:
    get:
      tags: [Notifications]
      summary: Get notification preferences
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Notification preferences }
    patch:
      tags: [Notifications]
      summary: Update notification preferences
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Preferences updated }
