openapi: 3.1.0
info:
  title: TWallet Services API — Users
  version: 1.0.0
servers:
  - url: https://api.twalletservices.com/api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        full_name: { type: string }
        avatar_url: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        country: { type: string }
        email_verified: { type: boolean }
        kyc_status: { type: string, enum: [none, tier_1, tier_2] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UpdateProfileInput:
      type: object
      properties:
        full_name: { type: string, minLength: 2, maxLength: 100 }
        phone: { type: string, pattern: "^\+[1-9]\d{1,14}$" }
        avatar_url: { type: string, format: uri }
    UserPreferences:
      type: object
      properties:
        language: { type: string, default: en }
        currency: { type: string, default: USD }
        theme: { type: string, enum: [light, dark, system], default: light }
        notifications:
          type: object
          properties:
            email_order_confirmed: { type: boolean }
            email_payment_received: { type: boolean }
            email_shipping_update: { type: boolean }
            push_order_status: { type: boolean }
            push_promotions: { type: boolean }
security:
  - bearerAuth: []
paths:
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    $ref: '#/components/schemas/UserProfile'
    patch:
      tags: [Users]
      summary: Update current user profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileInput'
      responses:
        '200':
          description: Profile updated
  /users/preferences:
    get:
      tags: [Users]
      summary: Get user preferences
      responses:
        '200':
          description: User preferences
    patch:
      tags: [Users]
      summary: Update user preferences
      responses:
        '200':
          description: Preferences updated
  /users/security:
    get:
      tags: [Users]
      summary: Get security settings
      responses:
        '200':
          description: Security settings
