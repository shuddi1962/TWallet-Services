openapi: 3.1.0
info:
  title: TWallet Services API — Orders
  version: 1.0.0
servers:
  - url: https://api.twalletservices.com/api/v1
paths:
  /orders:
    get:
      tags: [Orders]
      summary: List user's orders
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: card_slug, in: query, schema: { type: string } }
        - { name: date_from, in: query, schema: { type: string, format: date-time } }
        - { name: date_to, in: query, schema: { type: string, format: date-time } }
        - { name: page_size, in: query, schema: { type: integer, default: 20 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200': { description: Order list }
  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order details
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Order details }
        '404': { description: Order not found }
  /orders/{id}/cancel:
    patch:
      tags: [Orders]
      summary: Cancel an order
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Order cancelled }
        '409': { description: Cannot cancel in current status }
  /orders/{id}/invoice:
    get:
      tags: [Orders]
      summary: Download order invoice (PDF)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Invoice PDF
          content:
            application/pdf: {}
  /orders/tracking/{tracking_number}:
    get:
      tags: [Orders]
      summary: Look up order by tracking number
      parameters:
        - { name: tracking_number, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Tracking details }
        '404': { description: Tracking number not found }
