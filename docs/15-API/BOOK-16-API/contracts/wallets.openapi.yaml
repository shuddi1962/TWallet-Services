openapi: 3.1.0
info:
  title: TWallet Services API — Wallets
  version: 1.0.0
servers:
  - url: https://api.twalletservices.com/api/v1
paths:
  /wallets:
    get:
      tags: [Wallets]
      summary: List connected wallets
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page_size, in: query, schema: { type: integer, default: 20 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Wallet list
  /wallets/connect:
    post:
      tags: [Wallets]
      summary: Connect a wallet
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, network, network_id, signature, message]
              properties:
                address: { type: string, pattern: "^0x[a-fA-F0-9]{40}$" }
                network: { type: string }
                network_id: { type: integer }
                label: { type: string, maxLength: 50 }
                signature: { type: string }
                message: { type: string }
      responses:
        '201': { description: Wallet connected }
        '409': { description: Wallet already connected }
  /wallets/{id}:
    delete:
      tags: [Wallets]
      summary: Disconnect a wallet
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Wallet disconnected }
  /wallets/default:
    patch:
      tags: [Wallets]
      summary: Set default wallet
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_id]
              properties:
                wallet_id: { type: string, format: uuid }
      responses:
        '200': { description: Default wallet updated }
  /wallets/networks:
    get:
      tags: [Wallets]
      summary: Get supported networks
      responses:
        '200':
          description: Network list
