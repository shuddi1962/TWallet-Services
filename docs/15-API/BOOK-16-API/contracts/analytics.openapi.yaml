openapi: 3.1.0
info:
  title: TWallet Services API — Analytics
  version: 1.0.0
servers:
  - url: https://api.twalletservices.com/api/v1
paths:
  /analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Get dashboard analytics
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: date_from, in: query, schema: { type: string, format: date-time } }
        - { name: date_to, in: query, schema: { type: string, format: date-time } }
        - { name: granularity, in: query, schema: { type: string, enum: [day, week, month], default: day } }
      responses:
        '200': { description: Dashboard analytics }
  /analytics/orders:
    get:
      tags: [Analytics]
      summary: Get order analytics
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Order analytics }
  /analytics/payments:
    get:
      tags: [Analytics]
      summary: Get payment analytics
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Payment analytics }
  /analytics/users:
    get:
      tags: [Analytics]
      summary: Get user analytics
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: User analytics }
  /analytics/export:
    get:
      tags: [Analytics]
      summary: Export analytics as CSV
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: dataset, in: query, required: true, schema: { type: string, enum: [revenue, orders, payments, users] } }
        - { name: date_from, in: query, schema: { type: string, format: date-time } }
        - { name: date_to, in: query, schema: { type: string, format: date-time } }
        - { name: granularity, in: query, schema: { type: string, enum: [day, week, month], default: day } }
      responses:
        '200':
          description: CSV file
          content:
            text/csv: {}
