openapi: 3.1.0
info:
  title: TWallet Services API — Authentication
  version: 1.0.0
  description: User registration, login, session management, and email verification
servers:
  - url: https://api.twalletservices.com/api/v1
    description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterInput:
      type: object
      required: [email, password, full_name, accept_terms]
      properties:
        email: { type: string, format: email, example: user@example.com }
        password: { type: string, minLength: 8, example: "SecurePass123!" }
        full_name: { type: string, minLength: 2, maxLength: 100 }
        phone: { type: string, pattern: "^\+[1-9]\d{1,14}$" }
        country: { type: string, minLength: 2, maxLength: 2, example: "US" }
        accept_terms: { type: boolean, enum: [true] }
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        remember_me: { type: boolean, default: false }
    SessionData:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_at: { type: string, format: date-time }
    AuthResponse:
      type: object
      properties:
        success: { type: boolean, enum: [true] }
        message: { type: string }
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id: { type: string, format: uuid }
                email: { type: string, format: email }
                full_name: { type: string }
                avatar_url: { type: string, nullable: true }
            session:
              $ref: '#/components/schemas/SessionData'
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, enum: [false] }
        message: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              field: { type: string }
              message: { type: string }
paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      tags: [Authentication]
      summary: Destroy current session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: Token refreshed
  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Send password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Reset email sent
  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string, format: uuid }
      responses:
        '200':
          description: Email verified
  /auth/session:
    get:
      tags: [Authentication]
      summary: Get current session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current session data
