openapi: 3.1.0
info:
  title: TWallet Services API — Cards
  version: 1.0.0
servers:
  - url: https://api.twalletservices.com/api/v1
paths:
  /cards:
    get:
      tags: [Cards]
      summary: List available card products
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [physical, virtual] } }
        - { name: network, in: query, schema: { type: string } }
        - { name: active, in: query, schema: { type: boolean, default: true } }
      responses:
        '200':
          description: Card product list
  /cards/{slug}:
    get:
      tags: [Cards]
      summary: Get card product details
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Card product details }
        '404': { description: Card not found }
  /cards/order:
    post:
      tags: [Cards]
      summary: Create a card order
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [card_slug, network, token]
              properties:
                card_slug: { type: string }
                network: { type: string }
                token: { type: string }
                shipping_address:
                  type: object
                  properties:
                    full_name: { type: string }
                    line1: { type: string }
                    line2: { type: string }
                    city: { type: string }
                    state: { type: string }
                    postal_code: { type: string }
                    country: { type: string, minLength: 2, maxLength: 2 }
      responses:
        '201': { description: Order created }
  /cards/orders:
    get:
      tags: [Cards]
      summary: Get customer's card orders
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Customer order list }
