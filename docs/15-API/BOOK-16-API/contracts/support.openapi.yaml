openapi: 3.1.0
info:
  title: TWallet Services API — Support
  version: 1.0.0
servers:
  - url: https://api.twalletservices.com/api/v1
paths:
  /support/tickets:
    get:
      tags: [Support]
      summary: List user's support tickets
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, pending, resolved, closed] } }
        - { name: page_size, in: query, schema: { type: integer, default: 20 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200': { description: Ticket list }
    post:
      tags: [Support]
      summary: Create a support ticket
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, message, category]
              properties:
                subject: { type: string, minLength: 5, maxLength: 200 }
                message: { type: string, minLength: 10, maxLength: 5000 }
                category: { type: string, enum: [shipping, payment, card, account, other] }
                priority: { type: string, enum: [low, medium, high, urgent], default: medium }
                order_id: { type: string, format: uuid }
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      url: { type: string, format: uri }
                      name: { type: string }
                      mime_type: { type: string }
                  maxItems: 5
      responses:
        '201': { description: Ticket created }
  /support/tickets/{id}:
    get:
      tags: [Support]
      summary: Get ticket details
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Ticket details with messages }
    patch:
      tags: [Support]
      summary: Update ticket status
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [closed] }
      responses:
        '200': { description: Ticket updated }
  /support/tickets/{id}/reply:
    post:
      tags: [Support]
      summary: Reply to a ticket
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, minLength: 1, maxLength: 5000 }
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      url: { type: string, format: uri }
                      name: { type: string }
                      mime_type: { type: string }
      responses:
        '201': { description: Reply sent }
